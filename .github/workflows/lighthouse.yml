name: Lighthouse

on:
  pull_request:
    paths:
      - "docs/**"
      - ".lighthouserc.json"
      - ".github/workflows/lighthouse.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Serves ./docs as a static site (no deploy needed) and audits it,
      # taking the median of 3 runs. Config lives in .lighthouserc.json.
      # Report links are printed in the logs (temporary public storage).
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
